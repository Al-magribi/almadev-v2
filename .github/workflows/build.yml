name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Next.js build
    runs-on: ubuntu-latest

    env:
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Validate required secrets
        run: |
          test -n "$MONGODB_URI" || (echo "Missing GitHub Secret: MONGODB_URI" && exit 1)
          test -n "$JWT_SECRET" || (echo "Missing GitHub Secret: JWT_SECRET" && exit 1)

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
